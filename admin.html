<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pannello di Controllo Docente - Admin</title>
    <style>
        :root {
            --primary: #0056b3;
            --success: #28a745;
            --danger: #dc3545;
            --bg: #eef2f5;
            --dark: #333;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--dark); }
        .container { max-width: 1100px; margin: 0 auto; }
        
        .header-bar { display: flex; justify-content: space-between; align-items: center; background: white; padding: 20px 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .header-bar h2 { margin: 0; color: var(--primary); }
        .btn-logout { background: var(--danger); color: white; padding: 8px 15px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 10px 20px; background: #ddd; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .tab-btn.active { background: var(--primary); color: white; }
        
        .sezione-panel { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; display: none; }
        .sezione-panel.active { display: block; }
        
        .form-inline { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)) auto; gap: 10px; align-items: flex-end; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid #eee; }
        .form-group { display: flex; flex-direction: column; text-align: left; }
        label { font-weight: 600; margin-bottom: 5px; font-size: 13px; }
        input, select { padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
        
        .btn-azione { padding: 10px 15px; background: var(--primary); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-azione.success { background: var(--success); }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; font-size: 14px; }
        th { background: #f8f9fa; color: #555; }
        
        .btn-small { padding: 5px 10px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; }
        .btn-small.danger { background: #ffe3e3; color: var(--danger); }
        .btn-small.primary { background: #e8f4fd; color: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <div class="header-bar">
        <h2>Pannello di Controllo Docente 👑</h2>
        <button class="btn-logout" onclick="logout()">Esci 🚪</button>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="cambiaTab('studenti')">Gestione Studenti</button>
        <button class="tab-btn" onclick="cambiaTab('gruppi')">Gestione Gruppi</button>
        <button class="tab-btn" onclick="cambiaTab('materiale')">Configurazione Unità & Livelli</button>
    </div>

    <div id="panel-studenti" class="sezione-panel active">
        <h3>Anagrafica Studenti</h3>
        <div class="form-inline">
            <div class="form-group">
                <label>PIN / Codice Studente:</label>
                <input type="text" id="stud-pin" placeholder="Es: LAI592" style="text-transform: uppercase;">
            </div>
            <div class="form-group">
                <label>Nome Studente:</label>
                <input type="text" id="stud-nome" placeholder="Es: Laila">
            </div>
            <div class="form-group">
                <label>Gruppo:</label>
                <select id="stud-gruppo"><option value="milano_1">Milano 1</option></select>
            </div>
            <div class="form-group">
                <label>Ultima Unità Pagata (ID):</label>
                <input type="number" id="stud-pagato" value="1" min="0">
            </div>
            <button class="btn-azione success" onclick="salvaStudente()">Salva Studente 💾</button>
        </div>
        <table>
            <thead>
                <tr><th>PIN</th><th>Nome</th><th>Gruppo</th><th>Ultima Unità Pagata</th><th>Azioni</th></tr>
            </thead>
            <tbody id="tabella-studenti"></tbody>
        </table>
    </div>

    <div id="panel-gruppi" class="sezione-panel">
        <h3>Classi e Avanzamento Live</h3>
        <div class="form-inline">
            <div class="form-group">
                <label>ID Gruppo (Senza spazi):</label>
                <input type="text" id="group-id" placeholder="Es: milano_1">
            </div>
            <div class="form-group">
                <label>Nome del Gruppo:</label>
                <input type="text" id="group-nome" placeholder="Es: Milano Gruppo Serale">
            </div>
            <div class="form-group">
                <label>Unità Attiva Oggi (ID):</label>
                <input type="number" id="group-unita" value="1" min="0">
            </div>
            <button class="btn-azione success" onclick="salvaGruppo()">Salva Gruppo 💾</button>
        </div>
        <table>
            <thead>
                <tr><th>ID Gruppo</th><th>Nome Esteso</th><th>Unità Attiva Live</th><th>Azioni</th></tr>
            </thead>
            <tbody id="tabella-gruppi"></tbody>
        </table>
    </div>

    <div id="panel-materiale" class="sezione-panel">
        <h3>Gestione Catalogo Unità Didattiche</h3>
        <div class="form-inline" style="grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)) auto;">
            <div class="form-group">
                <label>ID Unità (Numero):</label>
                <input type="number" id="unit-id" placeholder="Es: 52" min="0">
            </div>
            <div class="form-group">
                <label>Titolo Unità:</label>
                <input type="text" id="unit-titolo" placeholder="Es: Un'occasione mancata">
            </div>
            <div class="form-group">
                <label>Livello Associato:</label>
                <select id="unit-corso">
                    <option value="A1.1">A1.1</option><option value="A1.2">A1.2</option>
                    <option value="A2.1">A2.1</option><option value="A2.2">A2.2</option>
                    <option value="B1.1">B1.1</option><option value="B1.2">B1.2</option>
                    <option value="B1.3">B1.3</option><option value="B1.4">B1.4</option>
                    <option value="B2.1">B2.1</option><option value="B2.2">B2.2</option>
                </select>
            </div>
            <div class="form-group">
                <label>Nome File HTML:</label>
                <input type="text" id="unit-file" placeholder="Es: unita52.html">
            </div>
            <button class="btn-azione success" onclick="salvaUnita()">Aggiungi/Modifica 💾</button>
        </div>
        <table>
            <thead>
                <tr><th>ID</th><th>Titolo Unità</th><th>Macro Corso/Livello</th><th>File Collegato</th><th>Azioni</th></tr>
            </thead>
            <tbody id="tabella-unita"></tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = { databaseURL: "https://esercizi-parlo-italiano-default-rtdb.europe-west1.firebasedatabase.app/" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Protezione iniziale: verifica se è l'admin
    if (localStorage.getItem('ruolo') !== 'admin') { window.location.href = "index.html"; }

    // Navigazione tra tab
    window.cambiaTab = function(tabName) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.sezione-panel').forEach(p => p.classList.remove('active'));
        event.currentTarget.classList.add('active');
        document.getElementById(`panel-${tabName}`).classList.add('active');
    };

    // --- LOGICA SCHEMA 3: GESTIONE CATALOGO UNITA' ---
    window.salvaUnita = function() {
        const id = document.getElementById('unit-id').value.trim();
        const titolo = document.getElementById('unit-titolo').value.trim();
        const corso = document.getElementById('unit-corso').value;
        const file = document.getElementById('unit-file').value.trim() || `unita${id}.html`;

        if(!id || !titolo) { alert("Inserisci ID e Titolo dell'unità."); return; }

        set(ref(db, `scuola_materiale/unita/u${id}`), {
            id: parseInt(id),
            titolo: "Unità " + id + " - " + titolo.replace(/^Unità\s+\d+\s+-\s+/, ""),
            corso: corso,
            file: file
        }).then(() => {
            document.getElementById('unit-id').value = '';
            document.getElementById('unit-titolo').value = '';
            document.getElementById('unit-file').value = '';
        });
    };

    onValue(ref(db, `scuola_materiale/unita`), (snapshot) => {
        const tbody = document.getElementById('tabella-unita');
        tbody.innerHTML = '';
        if(snapshot.exists()) {
            const data = snapshot.val();
            // Ordiniamo le unità per ID numerico crescente
            const listaOrdinate = Object.values(data).sort((a,b) => a.id - b.id);
            listaOrdinate.forEach(unita => {
                let tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${unita.id}</strong></td>
                    <td>${unita.titolo}</td>
                    <td><span style="background:#e8f4fd; padding:3px 8px; border-radius:10px; font-weight:bold; color:var(--primary);">${unita.corso}</span></td>
                    <td><code>${unita.file}</code></td>
                    <td>
                        <button class="btn-small primary" onclick="caricaModificaUnita('${unita.id}', '${unita.titolo}', '${unita.corso}', '${unita.file}')">Modifica</button>
                        <button class="btn-small danger" onclick="eliminaUnita('${unita.id}')">Elimina</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }
    });

    window.caricaModificaUnita = function(id, titolo, corso, file) {
        document.getElementById('unit-id').value = id;
        document.getElementById('unit-titolo').value = titolo.replace(/^Unità\s+\d+\s+-\s+/, "");
        document.getElementById('unit-corso').value = corso;
        document.getElementById('unit-file').value = file;
        cambiaTab('materiale');
    };

    window.eliminaUnita = function(id) {
        if(confirm(`Vuoi davvero eliminare l'unità ${id}?`)) { remove(ref(db, `scuola_materiale/unita/u${id}`)); }
    };

    // --- LOGICA SCHEMA 1 E 2: ANAGRAFICA E GRUPPI ---
    window.salvaStudente = function() {
        const pin = document.getElementById('stud-pin').value.trim().toUpperCase();
        const nome = document.getElementById('stud-nome').value.trim();
        const gruppo = document.getElementById('stud-gruppo').value;
        const pagato = document.getElementById('stud-pagato').value;

        if(!pin || !nome) { alert("Completa tutti i campi dello studente."); return; }
        set(ref(db, `scuola_anagrafica/studenti/${pin}`), { nome: nome, gruppo: gruppo, ultimaUnitaPagata: parseInt(pagato) });
    };

    window.salvaGruppo = function() {
        const id = document.getElementById('group-id').value.trim();
        const nome = document.getElementById('group-nome').value.trim();
        const unita = document.getElementById('group-unita').value;

        if(!id || !nome) { alert("Completa tutti i campi del gruppo."); return; }
        set(ref(db, `scuola_anagrafica/gruppi/${id}`), { nomeGruppo: nome, unitaAttiva: parseInt(unita) });
    };

    // Lettura Realtime elenchi Studenti e Gruppi
    onValue(ref(db, `scuola_anagrafica/studenti`), (snapshot) => {
        const tbody = document.getElementById('tabella-studenti'); tbody.innerHTML = '';
        if(snapshot.exists()) {
            Object.entries(snapshot.val()).forEach(([pin, s]) => {
                let tr = document.createElement('tr');
                tr.innerHTML = `<td><code>${pin}</code></td><td>${s.nome}</td><td>${s.gruppo}</td><td>Unità ${s.ultimaUnitaPagata}</td>
                <td><button class="btn-small danger" onclick="remove(ref(db, 'scuola_anagrafica/studenti/${pin}'))">Elimina</button></td>`;
                tbody.appendChild(tr);
            });
        }
    });

    onValue(ref(db, `scuola_anagrafica/gruppi`), (snapshot) => {
        const tbody = document.getElementById('tabella-gruppi'); tbody.innerHTML = '';
        const selectStud = document.getElementById('stud-gruppo'); selectStud.innerHTML = '';
        if(snapshot.exists()) {
            Object.entries(snapshot.val()).forEach(([id, g]) => {
                let tr = document.createElement('tr');
                tr.innerHTML = `<td><code>${id}</code></td><td>${g.nomeGruppo}</td><td>Unità ${g.unitaAttiva}</td>
                <td><button class="btn-small danger" onclick="remove(ref(db, 'scuola_anagrafica/gruppi/${id}'))">Elimina</button></td>`;
                tbody.appendChild(tr);
                
                let opt = document.createElement('option'); opt.value = id; opt.innerText = g.nomeGruppo; selectStud.appendChild(opt);
            });
        }
    });

    window.logout = function() { localStorage.clear(); window.location.href = "index.html"; };
</script>
</body>
</html>
