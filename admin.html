<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pannello Admin - Scuola di Italiano</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f7f6; color: #333; }
        h1, h2 { color: #0056b3; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .section { margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #ddd; }
        select, input, button { padding: 8px; margin: 5px 0; font-size: 14px; border-radius: 4px; border: 1px solid #ccc; }
        button { background-color: #28a745; color: white; cursor: pointer; border: none; }
        button:hover { background-color: #218838; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>

<div class="container">
    <h1>Pannello di Controllo Docente 👨‍🏫</h1>
    
    <!-- SELEZIONE GRUPPO -->
    <div class="section">
        <h2>1. Gestione Gruppo</h2>
        <label for="select-gruppo">Scegli il gruppo da gestire:</label>
        <select id="select-gruppo" onchange="caricaDatiGruppo()">
            <option value="">-- Seleziona Gruppo --</option>
            <option value="gruppo_A">Gruppo A</option>
            <option value="gruppo_B">Gruppo B</option>
        </select>
    </div>

    <!-- CONTROLLO UNITÀ LIVE -->
    <div class="section" id="controllo-lezione" style="display:none;">
        <h2>2. Lezione del Giorno</h2>
        <p>Imposta quale unità è attualmente attiva per la lezione live di questo gruppo:</p>
        <label for="unita-attiva">Unità Attiva:</label>
        <select id="unita-attiva">
            <option value="unita1">Unità 1 - Presentarsi</option>
            <option value="unita2">Unità 2 - Al bar</option>
            <option value="unita3">Unità 3 - Tempo libero</option>
        </select>
        <button onclick="aggiornaUnitaGruppo()">Attiva per il Gruppo</button>
    </div>

    <!-- ELENCO STUDENTI E PAGAMENTI -->
    <div class="section" id="sezione-studenti" style="display:none;">
        <h2>3. Studenti del Gruppo e Limiti di Accesso</h2>
        <table>
            <thead>
                <tr>
                    <th>Nome Studente</th>
                    <th>PIN / ID</th>
                    <th>Ultima Unità Pagata (Limite Accesso)</th>
                    <th>Salva</th>
                </tr>
            </thead>
            <tbody id="tabella-studenti">
                <!-- I dati degli studenti verranno inseriti qui dinamicamente -->
            </tbody>
        </table>
    </div>
</div>

<!-- SDK Firebase (Modulari) -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, get, update, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // Inserisci qui la configurazione del tuo progetto Firebase
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_AUTH_DOMAIN",
        databaseURL: "YOUR_DATABASE_URL",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_STORAGE_BUCKET",
        messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Funzione per caricare i dati del gruppo selezionato
    window.caricaDatiGruppo = function() {
        const gruppo = document.getElementById('select-gruppo').value;
        if (!gruppo) {
            document.getElementById('controllo-lezione').style.display = 'none';
            document.getElementById('sezione-studenti').style.display = 'none';
            return;
        }

        document.getElementById('controllo-lezione').style.display = 'block';
        document.getElementById('sezione-studenti').style.display = 'block';

        // 1. Leggi l'unità attiva del gruppo
        onValue(ref(db, `gruppi/${gruppo}/unitaAttiva`), (snapshot) => {
            if (snapshot.exists()) {
                document.getElementById('unita-attiva').value = snapshot.val();
            }
        });

        // 2. Leggi gli studenti di quel gruppo
        onValue(ref(db, `studenti`), (snapshot) => {
            const tabella = document.getElementById('tabella-studenti');
            tabella.innerHTML = '';
            
            if (snapshot.exists()) {
                const studenti = snapshot.val();
                for (let id in studenti) {
                    if (studenti[id].gruppo === gruppo) {
                        const studente = studenti[id];
                        const riga = `
                            <tr>
                                <td><strong>${studente.nome}</strong></td>
                                <td><code>${id}</code></td>
                                <td>
                                    <input type="number" id="limite-${id}" value="${studente.ultimaUnitaPagata || 1}" min="1" max="10" style="width: 60px;">
                                </td>
                                <td>
                                    <button onclick="aggiornaLimiteStudente('${id}')" style="background-color: #007bff;">Salva</button>
                                </td>
                            </tr>
                        `;
                        tabella.innerHTML += riga;
                    }
                }
            }
        });
    }

    // Funzione per aggiornare l'unità attiva del gruppo
    window.aggiornaUnitaGruppo = function() {
        const gruppo = document.getElementById('select-gruppo').value;
        const nuovaUnita = document.getElementById('unita-attiva').value;
        
        update(ref(db, `gruppi/${gruppo}`), {
            unitaAttiva: nuovaUnita
        }).then(() => alert('Unità del gruppo aggiornata con successo! 🚀'));
    }

    // Funzione per aggiornare l'ultima unità pagata del singolo studente
    window.aggiornaLimiteStudente = function(studenteId) {
        const limiteInviato = parseInt(document.getElementById(`limite-${studenteId}`).value);
        
        update(ref(db, `studenti/${studenteId}`), {
            ultimaUnitaPagata: limiteInviato
        }).then(() => alert('Limite dello studente aggiornato! 👍'));
    }
</script>
</body>
</html>
