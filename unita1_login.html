<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accesso Lezione - Parlo Italiano</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #008C45, #CD212A); height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); text-align: center; width: 90%; max-width: 350px; }
        h2 { color: #333; margin-bottom: 5px; }
        .ru { color: #666; font-style: italic; font-size: 0.85rem; margin-bottom: 25px; line-height: 1.4; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 2px solid #ddd; border-radius: 10px; box-sizing: border-box; text-align: center; font-size: 1rem; }
        button { width: 100%; background: #008C45; color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.3s; }
        button:hover { background: #005a2d; }
        #error { color: #CD212A; display: none; margin-top: 15px; font-weight: bold; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Unità 1</h2>
        <p class="ru">Inserisci nome utente e password<br>(Введите имя пользователя и пароль)</p>
        
        <input type="text" id="user" placeholder="Nome Utente (Имя)">
        <input type="password" id="pass" placeholder="Password (Пароль)">
        
        <button onclick="entra()">ENTRA / ВОЙТИ</button>
        <p id="error">Dati errati! / Неверные данные</p>
    </div>

    <script>
        function entra() {
            const u = document.getElementById('user').value.toLowerCase().trim();
            const p = document.getElementById('pass').value.trim();

            // Qui imposti le credenziali che preferisci
            const utenteValido = "studente";
            const passwordValida = "roma2024";

            if (u === utenteValido && p === passwordValida) {
                // Se i dati sono corretti, vai alla lezione segreta
                window.location.href = "lezione_01_segreta.html";
            } else {
                document.getElementById('error').style.display = 'block';
            }
        }

        // Permette di premere Invio sulla tastiera per entrare
        document.addEventListener("keyup", function(e) {
            if (e.key === "Enter") entra();
        });
    </script>
</body>
</html>
