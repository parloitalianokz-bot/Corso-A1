<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bacheca Corsi - Scuola di Italiano</title>
    <style>
        :root {
            --primary: #0056b3;
            --success: #28a745;
            --danger: #dc3545;
            --bg: #eef2f5;
            --dark: #333;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--dark); }
        .container { max-width: 900px; margin: 0 auto; }
        
        .header-bar { display: flex; justify-content: space-between; align-items: center; background: white; padding: 20px 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .header-bar h2 { margin: 0; color: var(--primary); }
        .welcome-msg { font-size: 16px; color: #555; }
        .btn-logout { background: var(--danger); color: white; padding: 8px 15px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        
        .corsi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .corso-btn { background: white; border: 2px solid #ddd; padding: 20px; border-radius: 10px; text-align: center; font-size: 18px; font-weight: bold; cursor: pointer; transition: all 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .corso-btn.attivo { border-color: var(--primary); color: var(--primary); background: #f1f7fe; }
        .corso-btn.selezionato { background: var(--primary); color: white; border-color: var(--primary); }
        .corso-btn.bloccato { background: #e0e0e0; color: #888; border-color: #ccc; cursor: not-allowed; }

        .unita-sezione { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .unita-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-top: 15px; }
        .unita-card { background: white; padding: 15px 20px; border-radius: 8px; border: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .unita-info h4 { margin: 0 0 4px 0; color: #222; font-size: 16px; }
        
        .status-badge { padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; margin-right: 15px; display: inline-block; }
        .status-active { background: #e3faf2; color: #20c997; }
        .status-waiting { background: #fff3cd; color: #856404; }
        .status-locked { background: #ffe3e3; color: #e03131; }
        
        .btn-entra { background: var(--primary); color: white; padding: 8px 16px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; text-decoration: none; font-size: 13px; display: inline-block; }
        .btn-entra.disabled { background: #ccc; color: #666; cursor: not-allowed; pointer-events: none; }
        .btn-back { background: #6c757d; color: white; padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; margin-bottom: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-bar">
        <div>
            <h2>Scuola di Italiano Parlo Italiano 🇮🇹</h2>
            <div class="welcome-msg" id="saluto-utente">Caricamento dati...</div>
        </div>
        <button class="btn-logout" onclick="logout()">Esci 🚪</button>
    </div>

    <h3>Scegli il tuo Livello</h3>
    <div class="corsi-grid" id="griglia-macro-corsi"></div>

    <div class="unita-sezione" id="area-unita" style="display:none;">
        <button class="btn-back" onclick="chiudiUnita()">&larr; Torna ai Livelli</button>
        <h3 id="titolo-livello-selezionato">Unità del Livello</h3>
        <div class="unita-grid" id="lista-unita"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = { databaseURL: "https://esercizi-parlo-italiano-default-rtdb.europe-west1.firebasedatabase.app/" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const pin = localStorage.getItem('studente_pin');
    const nome = localStorage.getItem('studente_nome');
    const gruppo = localStorage.getItem('studente_gruppo');
    const ruolo = localStorage.getItem('ruolo');

    if (!pin || !nome) { window.location.href = "index.html"; }

    document.getElementById('saluto-utente').innerHTML = `Benvenuto, <strong>${nome}</strong> ` + (ruolo === 'admin' ? `(Docente 👑)` : `[PIN: ${pin}]`);

    const elencoMacroCorsi = ["A1.1", "A1.2", "A2.1", "A2.2", "B1.1", "B1.2", "B1.3", "B1.4", "B2.1", "B2.2"];
    let databaseUnita = []; 

    // 🌟 LEGGE ESCLUSIVAMENTE DA FIREBASE
    onValue(ref(db, `scuola_materiale/unita`), (catalogSnap) => {
        databaseUnita = catalogSnap.exists() ? Object.values(catalogSnap.val()) : [];
        
        if (ruolo === 'admin') {
            renderMacroCorsi(elencoMacroCorsi, "B2.2", true);
        } else {
            // Carica info studente loggato
            onValue(ref(db, `scuola_anagrafica/studenti/${pin}`), (studSnap) => {
                if (!studSnap.exists()) { logout(); return; }
                const maxPagatoStudente = studSnap.val().ultimaUnitaPagata || 1;

                onValue(ref(db, `scuola_anagrafica/gruppi/${gruppo}`), (gruppoSnap) => {
                    const unitaAttivaGruppo = gruppoSnap.exists() ? (gruppoSnap.val().unitaAttiva || 1) : 1;
                    
                    let corsoMassimoRaggiunto = "A1.1";
                    const unitaTrovata = databaseUnita.find(u => u.id === maxPagatoStudente);
                    if (unitaTrovata) corsoMassimoRaggiunto = unitaTrovata.corso;

                    renderMacroCorsi(elencoMacroCorsi, corsoMassimoRaggiunto, false, maxPagatoStudente, unitaAttivaGruppo);
                });
            });
        }
    });

    function renderMacroCorsi(listaCorsi, corsoMassimoRaggiunto, isAdmin, maxPagato, attivaGruppo) {
        const grid = document.getElementById('griglia-macro-corsi');
        grid.innerHTML = '';
        const indexMax = listaCorsi.indexOf(corsoMassimoRaggiunto);

        listaCorsi.forEach(corso => {
            let btn = document.createElement('button');
            btn.className = 'corso-btn';
            btn.innerText = corso;
            const indexCorrente = listaCorsi.indexOf(corso);

            if (isAdmin || indexCorrente <= indexMax) {
                btn.classList.add('attivo');
                btn.onclick = () => mostraUnitaLivello(corso, isAdmin, maxPagato, attivaGruppo);
            } else {
                btn.classList.add('bloccato');
            }
            grid.appendChild(btn);
        });
    }

    window.mostraUnitaLivello = function(nomeCorso, isAdmin, maxPagato, attivaGruppo) {
        document.getElementById('area-unita').style.display = 'block';
        document.getElementById('titolo-livello-selezionato').innerText = `Unità sbloccate per il livello: ${nomeCorso}`;
        const listaUl = document.getElementById('lista-unita');
        listaUl.innerHTML = '';

        const unitaFiltrate = databaseUnita.filter(u => u.corso === nomeCorso).sort((a,b) => a.id - b.id);

        unitaFiltrate.forEach(unita => {
            let card = document.createElement('div');
            card.className = 'unita-card';
            let info = `<div class="unita-info"><h4>${unita.titolo}</h4></div>`;
            let azione = '';

            if (isAdmin) {
                azione = `<span class="status-badge status-active">Docente</span><button class="btn-entra" onclick="gestisciInizioUnita('${unita.id}', '${unita.file}')">Apri 👁️</button>`;
            } else {
                const sbloccataDocente = unita.id <= attivaGruppo;
                const pagataStudente = unita.id <= maxPagato;

                if (sbloccataDocente && pagataStudente) {
                    azione = `<span class="status-badge status-active">Disponibile ✅</span><button class="btn-entra" onclick="gestisciInizioUnita('${unita.id}', '${unita.file}')">Inizia 🚀</button>`;
                } else if (!sbloccataDocente && pagataStudente) {
                    azione = `<span class="status-badge status-waiting">In arrivo ⏳</span><button class="btn-entra disabled">Attendi</button>`;
                } else {
                    azione = `<span class="status-badge status-locked">Bloccata ⛔</span><button class="btn-entra disabled">Bloccata</button>`;
                }
            }
            card.innerHTML = info + `<div style="display:flex; align-items:center;">${azione}</div>`;
            listaUl.appendChild(card);
        });
        
        document.querySelectorAll('.corso-btn').forEach(b => b.classList.remove('selezionato'));
        event.currentTarget.classList.add('selezionato');
    };

    // 🚀 NUOVA LOGICA INTELLIGENTE DI REINDIRIZZAMENTO SEQUENZIALE
    window.gestisciInizioUnita = function(unitaId, fileDefault) {
        // Se l'unità sul database è impostata come "unita1.html", deviamo verso il percorso Balboni
        if (parseInt(unitaId) === 1 || fileDefault === 'unita1.html') {
            const posizioneSalvata = localStorage.getItem(pin + '_posizione_U1');
            if (posizioneSalvata) {
                window.location.href = posizioneSalvata;
            } else {
                window.location.href = "u1_globalita.html";
            }
        } else {
            // Per tutte le altre unità non ancora scomposate, segue il file classico impostato da Admin
            window.location.href = fileDefault;
        }
    };

    window.chiudiUnita = function() {
        document.getElementById('area-unita').style.display = 'none';
        document.querySelectorAll('.corso-btn').forEach(b => b.classList.remove('selezionato'));
    };

    window.logout = function() { localStorage.clear(); window.location.href = "index.html"; }
</script>
</body>
</html>
