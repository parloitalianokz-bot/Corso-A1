<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Corso di Italiano</title>
    <style>
        :root {
            --primary: #0056b3;
            --bg: #eef2f5;
            --dark: #333;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: var(--dark);
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
            text-align: center;
        }
        h1 { margin-top: 0; color: var(--primary); font-size: 24px; }
        p { color: #666; font-size: 14px; margin-bottom: 30px; }
        
        .form-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            text-align: left;
        }
        label { font-weight: 600; margin-bottom: 5px; font-size: 14px; }
        input {
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
            text-transform: uppercase;
            text-align: center;
            letter-spacing: 2px;
        }
        input:focus { outline: none; border-color: var(--primary); }
        
        .btn {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover { background: #004085; }
        
        .error-message {
            color: #dc3545;
            font-size: 14px;
            margin-top: 15px;
            font-weight: bold;
            min-height: 20px;
        }
    </style>
</head>
<body>

<div class="login-card">
    <h1>Scuola di Italiano 🇮🇹</h1>
    <p>Inserisci il tuo PIN personale per accedere alle lezioni del tuo corso.</p>
    
    <div class="form-group">
        <label for="pin-input">Il tuo PIN d'Accesso:</label>
        <input type="text" id="pin-input" placeholder="ES: MR26" maxlength="10">
    </div>
    
    <button class="btn" onclick="gestisciLogin()">Entra nella Scuola 🚀</button>
    
    <div id="errore-login" class="error-message"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        databaseURL: "https://esercizi-parlo-italiano-default-rtdb.europe-west1.firebasedatabase.app/"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.gestisciLogin = function() {
        const pinInserito = document.getElementById('pin-input').value.trim().toUpperCase();
        const erroreDiv = document.getElementById('errore-login');
        erroreDiv.innerText = "";

        if (!pinInserito) {
            erroreDiv.innerText = "Per favore, inserisci un PIN.";
            return;
        }

        // 🔐 COMANDO ADMIN: ACCESSO TOTALE
        if (pinInserito === "ADMIN") {
            // Salviamo i parametri speciali per garantire i superpoteri anche all'interno delle altre pagine
            localStorage.setItem('studente_pin', 'ADMIN');
            localStorage.setItem('studente_nome', 'Insegnante (Admin)');
            localStorage.setItem('studente_gruppo', 'admin_global');
            localStorage.setItem('ruolo', 'admin');

            // Veniamo indirizzati direttamente alla dashboard principale del docente
            window.location.href = "admin.html";
            return;
        }

        // ACCESSO STUDENTE STANDALONE
        const studenteRef = ref(db, `scuola_anagrafica/studenti/${pinInserito}`);
        
        get(studenteRef).then((snapshot) => {
            if (snapshot.exists()) {
                const datiStudente = snapshot.val();
                
                // Salviamo le informazioni dello studente
                localStorage.setItem('studente_pin', pinInserito);
                localStorage.setItem('studente_nome', datiStudente.nome);
                localStorage.setItem('studente_gruppo', datiStudente.gruppo);
                localStorage.removeItem('ruolo'); // Assicuriamoci che non sia rimasto memorizzato un ruolo admin precedente
                
                window.location.href = "profilo_studente.html";
            } else {
                erroreDiv.innerText = "PIN non trovato. Controlla il codice o chiedi all'insegnante.";
            }
        }).catch((error) => {
            console.error(error);
            erroreDiv.innerText = "Errore di connessione. Riprova più tardi.";
        });
    }

    document.getElementById('pin-input').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            gestisciLogin();
        }
    });
</script>
</body>
</html>
