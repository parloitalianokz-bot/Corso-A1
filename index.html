<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corso A1 - Parlo Italiano</title>
    <style>
        /* Palette colori aggiornata: Sfondo chiaro, testo scuro e dettagli Blu Navy/Tricolore */
        :root {
            --primary-blue: #002F6C; /* Elegante Blu Navy per i titoli principali */
            --italian-green: #008C45;
            --italian-red: #CD212A;
            --bg-color: #F8F9FA;
            --text-dark: #2C3E50;
        }

        body { 
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif; 
            background: var(--bg-color); 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center;
            min-height: 100vh;
            padding: 20px; 
            margin: 0; 
            box-sizing: border-box;
        }
        
        /* Linea tricolore decorativa sopra la card */
        .tricolore-bar {
            display: flex;
            width: 100%;
            max-width: 480px;
            height: 6px;
            border-radius: 6px 6px 0 0;
            overflow: hidden;
            margin-bottom: -6px;
            z-index: 2;
        }
        .bar-green { background: var(--italian-green); flex: 1; }
        .bar-white { background: #ffffff; flex: 1; }
        .bar-red { background: var(--italian-red); flex: 1; }

        .card { 
            background: white; 
            padding: 35px 30px; 
            border-radius: 0 0 20px 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.06); 
            width: 100%; 
            max-width: 480px; 
            box-sizing: border-box;
            text-align: left;
        }

        #login-section { text-align: center; } 
        
        h2 {
            margin-top: 0;
            font-weight: 700;
        }

        /* Input stilizzati e ottimizzati per mobile */
        input { 
            width: 100%; 
            padding: 14px; 
            margin: 10px 0; 
            border-radius: 10px; 
            border: 1px solid #E2E8F0; 
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }
        
        input:focus {
            outline: none;
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 3px rgba(0, 47, 108, 0.1);
        }
        
        /* Bottoni moderni con transizione fluida */
        button { 
            background: var(--primary-blue); 
            color: white; 
            border: none; 
            padding: 14px 30px; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: bold;
            font-size: 1rem;
            letter-spacing: 0.5px;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(0, 47, 108, 0.15);
        }
        
        button:hover { 
            opacity: 0.9;
            transform: translateY(-1px);
            box-shadow: 0 6px 15px rgba(0, 47, 108, 0.2);
        }

        /* I Link delle Unità stilizzati */
        .unit-link { 
            display: block; 
            padding: 16px 20px; 
            margin: 14px 0; 
            background: #ffffff; 
            border-radius: 12px; 
            text-decoration: none; 
            color: var(--text-dark); 
            border-left: 6px solid var(--italian-green); 
            box-shadow: 0 4px 10px rgba(0,0,0,0.03); 
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); 
            text-align: left; 
        }

        .unit-link:hover {
            transform: translateX(8px);
            background: #F8FAFC;
            border-left-color: var(--italian-red);
            box-shadow: 0 6px 15px rgba(0,0,0,0.06);
        }

        #welcome-msg {
            text-align: center; 
            color: var(--primary-blue);
        }

        .dashboard-text {
            text-align: center; 
            color: #64748B;
            font-size: 1.05rem;
            margin-bottom: 25px;
        }

        #dashboard { display: none; }
        
        #error { 
            color: var(--italian-red); 
            display: none; 
            text-align: center; 
            font-weight: 600; 
            margin-top: 15px;
            font-size: 0.95rem;
        }

        .logout-btn {
            background: #64748B;
            box-shadow: none;
            margin-top: 10px;
        }
        .logout-btn:hover {
            background: #475569;
            box-shadow: none;
        }
    </style>
</head>
<body>

    <div class="tricolore-bar">
        <div class="bar-green"></div>
        <div class="bar-white"></div>
        <div class="bar-red"></div>
    </div>

    <div id="login-section" class="card">
        <h2 style="color: var(--primary-blue);">Login Studenti</h2>
        <input type="text" id="user" placeholder="Nome Utente" oninput="nascondiErrore()" autocomplete="username">
        <input type="password" id="pass" placeholder="Password" oninput="nascondiErrore()" onkeypress="controllaInvio(event)" autocomplete="current-password">
        <br><br>
        <button onclick="login()">ENTRA</button>
        <p id="error">⚠️ Nome utente o password errati!</p>
    </div>

    <div id="dashboard" class="card">
        <h2 id="welcome-msg">Benvenuto!</h2>
        <p class="dashboard-text">Le tue lezioni disponibili:</p>
        <div id="units-list"></div>
        <br>
        <button onclick="logout()" class="logout-btn">Esci (Logout)</button>
    </div>

    <script>
        // Le password sono codificate in Base64 per non lasciarle in chiaro nella pagina.
        // anna: roma24 -> cm9tYTI0
        // yulia: roma24 -> cm9tYTI0
        // marat: milano24 -> bWlsYW5vMjQ=
        // assel: milano24 -> bWlsYW5vMjQ=
        // antonio: amnesia -> YW1uZXNpYQ==
        const database = {
            "anna":    { pass: "cm9tYTI0",   maxUnit: 3 },
            "yulia":   { pass: "cm9tYTI0",   maxUnit: 3 },
            "marat":   { pass: "bWlsYW5vMjQ=", maxUnit: 1 },
            "assel":   { pass: "bWlsYW5vMjQ=", maxUnit: 1 },
            "antonio": { pass: "YW1uZXNpYQ==",    maxUnit: 10 }
        };

        // Elenco ufficiale delle unità disponibili
        const nomiUnita = {
            1: "Benvenuti! (Добро пожаловать)",
            2: "In Città (В городе)",
            3: "La Famiglia (Моя семья)",
            4: "Al Ristorante (В ресторане)"
        };

        window.onload = function() {
            const savedUser = localStorage.getItem('user_parloitaliano');
            const savedPass = localStorage.getItem('pass_parloitaliano');

            if (savedUser && savedPass) {
                if (database[savedUser] && database[savedUser].pass === savedPass) {
                    mostraDashboard(savedUser);
                }
            }
        };

        function login() {
            const u = document.getElementById('user').value.toLowerCase().trim();
            const p = document.getElementById('pass').value.trim();
            
            // Codifichiamo la password inserita in Base64 per fare il confronto con il database
            const passwordCodificata = btoa(p);
            
            if (database[u] && database[u].pass === passwordCodificata) {
                localStorage.setItem('user_parloitaliano', u);
                localStorage.setItem('pass_parloitaliano', passwordCodificata);
                mostraDashboard(u);
            } else {
                document.getElementById('error').style.display = 'block';
            }
        }

        function logout() {
            localStorage.removeItem('user_parloitaliano');
            localStorage.removeItem('pass_parloitaliano');
            location.reload(); 
        }

        function mostraDashboard(userName) {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            
            document.getElementById('welcome-msg').innerText = "Ciao, " + userName.charAt(0).toUpperCase() + userName.slice(1) + "!";
            
            const max = database[userName].maxUnit;
            const container = document.getElementById('units-list');
            container.innerHTML = ""; 
            
            for (let i = 1; i <= max; i++) {
                // Controllo di sicurezza: se l'unità è definita nel nostro elenco 'nomiUnita' la mostriamo, 
                // altrimenti evitiamo di mostrare link vuoti o non pronti.
                if (nomiUnita[i]) {
                    const link = document.createElement('a');
                    link.href = "unita" + i + ".html";
                    link.className = "unit-link";
                    link.innerHTML = `<strong>Unità ${i}</strong> - ${nomiUnita[i]}`;
                    container.appendChild(link);
                }
            }
        }

        // Funzione per inviare il modulo premendo il tasto "Invio"
        function controllaInvio(event) {
            if (event.key === "Enter") {
                login();
            }
        }

        // Nasconde l'errore non appena lo studente ricomincia a scrivere
        function nascondiErrore() {
            document.getElementById('error').style.display = 'none';
        }
    </script>
</body>
</html>
