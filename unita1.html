<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unità 1 - Benvenuti!</title>

    <script>
        const user = localStorage.getItem('user_parloitaliano');
        if (!user) { window.location.href = "index.html"; }
    </script>
    
    <style>
        :root {
            --it-verde: #008C45;
            --it-rosso: #CD212A;
            --bg: #f4f7f6;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            line-height: 1.6; 
            color: #333; 
            background: var(--bg); 
            margin: 0; 
            padding: 10px; /* Ridotto per mobile */
        }

        .container { 
            max-width: 850px; 
            margin: auto; 
            background: white; 
            padding: 20px; /* Ridotto per mobile */
            border-radius: 25px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
        }

        /* Desktop: 40px padding */
        @media (min-width: 600px) {
            body { padding: 20px; }
            .container { padding: 40px; }
        }

        /* Titoli Bilingui */
        .welcome-header { text-align: center; margin-bottom: 30px; }
        .welcome-it { color: var(--it-rosso); font-size: 2.2rem; font-weight: bold; margin-bottom: 5px; }
        .welcome-ru { color: var(--it-verde); font-size: 1.5rem; font-style: italic; margin-top: 0; }

        /* Sezione Introduzione REATTIVA */
        .intro-section { 
            display: flex; 
            flex-wrap: wrap; /* Permette all'immagine di andare sotto su mobile */
            align-items: center; 
            gap: 20px; 
            margin-top: 30px; 
        }

        .intro-text { 
            flex: 1 1 300px; /* Occupa almeno 300px, poi si adatta */
            font-size: 1.2rem; 
        }

        .intro-img { 
            flex: 1 1 300px; 
            max-width: 100%; /* Si adatta alla larghezza del contenitore */
            height: auto; 
            border-radius: 15px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); 
            display: block;
        }

        .highlight-red { color: var(--it-rosso); font-weight: bold; }
        .highlight-green { color: var(--it-verde); font-weight: bold; }
        
        .btn-back { 
            display: inline-block; 
            margin-top: 30px; 
            text-decoration: none; 
            color: #666; 
            border: 1px solid #ccc; 
            padding: 10px 20px; 
            border-radius: 10px; 
            transition: 0.3s; 
        }
        .btn-back:hover { background: #eee; }

        hr { margin: 40px 0; border: 0; border-top: 1px solid #eee; }
    </style>
</head>
<body>

<div class="container">
    <header class="welcome-header">
        <div class="welcome-it">Benvenuti a lezione!</div>
        <div class="welcome-ru">Добро пожаловать на урок!</div>
    </header>

    <div class="intro-section">
        <div class="intro-text">
            <p>Cominciamo il nostro viaggio in Italia.</p>
            <p>Questa è la scuola <span class="highlight-red">"Parlo Italiano"</span>.</p>
            <p>La scuola "Parlo Italiano" è una <span class="highlight-green">scuola online</span>.</p>
        </div>
        
        <img src="img/1-scuolaonline.jpg" alt="Scuola Online" class="intro-img">
    </div>

    <hr>

    <a href="index.html" class="btn-back">⬅ Torna alla Dashboard</a>
</div>

</body>
</html>
