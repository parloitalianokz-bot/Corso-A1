<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unità 1 - Benvenuti!</title>

    <script>
        const user = localStorage.getItem('user_parloitaliano');
        if (!user) { window.location.href = "index.html"; }
    </script>
    
    <style>
        :root {
            --it-verde: #008C45;
            --it-rosso: #CD212A;
            --bg: #f4f7f6;
        }
        body { font-family: 'Segoe UI', sans-serif; line-height: 1.6; color: #333; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 850px; margin: auto; background: white; padding: 40px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        
        /* Titoli Bilingui Colorati */
        .welcome-header { text-align: center; margin-bottom: 40px; }
        .welcome-it { color: var(--it-rosso); font-size: 2.5rem; font-weight: bold; margin-bottom: 5px; }
        .welcome-ru { color: var(--it-verde); font-size: 1.8rem; font-style: italic; margin-top: 0; }

        /* Sezione Introduzione con Foto */
        .intro-section { display: flex; align-items: center; gap: 30px; margin-top: 30px; }
        .intro-text { flex: 1; font-size: 1.2rem; }
        .intro-img { flex: 1; max-width: 400px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }

        .highlight-red { color: var(--it-rosso); font-weight: bold; }
        .highlight-green { color: var(--it-verde); font-weight: bold; }
        
        .btn-back { display: inline-block; margin-top: 30px; text-decoration: none; color: #666; border: 1px solid #ccc; padding: 10px 20px; border-radius: 10px; transition: 0.3s; }
        .btn-back:hover { background: #eee; }
    </style>
</head>
<body>

<div class="container">
    <header class="welcome-header">
        <div class="welcome-it">Benvenuti a lezione!</div>
        <div class="welcome-ru">Добро пожаловать на урок!</div>
    </header>

    <div class="intro-section">
        <div class="intro-text">
            <p>Cominciamo il nostro viaggio in Italia.</p>
            <p>Questa è la scuola <span class="highlight-red">"Parlo Italiano"</span>.</p>
            <p>La scuola "Parlo Italiano" è una <span class="highlight-green">scuola online</span>.</p>
        </div>
        
        <img src="img/1.jpg" alt="Scuola Online" class="intro-img">
    </div>

    <hr style="margin: 40px 0; border: 0; border-top: 1px solid #eee;">

    <a href="index.html" class="btn-back">⬅ Torna alla Dashboard</a>
</div>

</body>
</html>
